<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 图书借阅管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 导航栏样式 - 活泼校园风 */
        nav.navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            box-shadow: 0 4px 16px rgba(74, 144, 226, 0.15) !important;
            padding: 1rem 0 !important;
        }

        nav.navbar .nav-link {
            color: white !important;
            font-weight: 500;
        }

        nav.navbar .nav-link:hover,
        nav.navbar .nav-link.active {
            color: white !important;
            background: rgba(255, 255, 255, 0.15);
        }

        nav.navbar .navbar-brand {
            color: white !important;
            font-weight: 700;
        }

        /* 首页专属样式 */
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4rem 0;
            margin-bottom: 3rem;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-section::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero-subtitle {
            font-size: 1.3rem;
            opacity: 0.95;
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-actions {
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .btn-hero {
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 2px solid white;
            margin: 0.5rem;
        }

        .btn-hero-primary {
            background: white;
            color: #667eea;
        }

        .btn-hero-primary:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .btn-hero-outline {
            background: transparent;
            color: white;
        }

        .btn-hero-outline:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
        }

        /* 统计卡片 */
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0.5rem 0;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 1rem;
            font-weight: 500;
        }

        /* 内容卡片 */
        .content-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .content-card:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
        }

        .card-header-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            font-weight: 600;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-header-custom i {
            font-size: 1.5rem;
        }

        /* 图书卡片 */
        .book-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
        }

        .book-cover {
            height: 220px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            position: relative;
            overflow: hidden;
        }

        .book-cover::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        }

        .book-status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
        }

        .badge-available {
            background: rgba(46, 204, 113, 0.9);
            color: white;
        }

        .badge-borrowed {
            background: rgba(255, 107, 107, 0.9);
            color: white;
        }

        .book-info {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .book-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 3rem;
        }

        .book-author {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .book-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: #95a5a6;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid #ecf0f1;
        }

        .book-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* 借阅记录卡片 */
        .borrow-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .borrow-item:hover {
            background: #fff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transform: translateX(5px);
        }

        .borrow-item.overdue {
            border-left-color: #ff6b6b;
            background: linear-gradient(to right, rgba(255, 107, 107, 0.05), white);
        }

        .borrow-item.returned {
            border-left-color: #2ecc71;
            opacity: 0.8;
        }

        .borrow-book-title {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .borrow-info {
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .borrow-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .btn-small {
            padding: 0.4rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h5 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: #7f8c8d;
            margin-bottom: 1.5rem;
        }

        /* 快捷操作按钮 */
        .quick-action-btn {
            padding: 1.25rem 2rem;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0.5rem;
        }

        .quick-action-btn i {
            font-size: 1.3rem;
        }

        /* 页脚 */
        .footer {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 2.5rem 0;
            margin-top: 4rem;
            text-align: center;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #764ba2;
        }

        /* 响应式优化 */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2rem;
            }

            .hero-subtitle {
                font-size: 1rem;
            }

            .stat-value {
                font-size: 2.2rem;
            }

            .btn-hero {
                padding: 0.875rem 2rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-book-half"></i> 图书借阅系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto" id="mainMenu">
                    <!-- 动态生成菜单 -->
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="userInfo">
                            <i class="bi bi-person-circle"></i>
                            <span id="userName">加载中...</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="Auth.logout()">
                            <i class="bi bi-box-arrow-right"></i> 退出
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 欢迎横幅 -->
    <div class="hero-section">
        <div class="container text-center">
            <h1 class="hero-title">📚 欢迎来到图书借阅管理系统</h1>
            <p class="hero-subtitle">探索知识的海洋，让阅读成为习惯</p>
            <div class="hero-actions" id="actionButtons">
                <!-- 动态生成操作按钮 -->
            </div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="container">
        <!-- 数据统计卡片 -->
        <div class="row mb-4" id="statsCards">
            <div class="col-lg-3 col-md-6 mb-3">
                <div class="stat-card">
                    <div class="stat-icon">📖</div>
                    <div class="stat-value" id="totalBooks">0</div>
                    <div class="stat-label">图书总数</div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-3">
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value" id="availableBooks">0</div>
                    <div class="stat-label">可借阅</div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-3">
                <div class="stat-card">
                    <div class="stat-icon">📤</div>
                    <div class="stat-value" id="borrowedBooks">0</div>
                    <div class="stat-label">已借出</div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6 mb-3">
                <div class="stat-card">
                    <div class="stat-icon">📋</div>
                    <div class="stat-value" id="myBorrows">0</div>
                    <div class="stat-label">我的借阅</div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- 热门推荐 -->
            <div class="col-lg-8 mb-4">
                <div class="content-card">
                    <div class="card-header-custom">
                        <i class="bi bi-fire"></i>
                        🔥 热门推荐
                    </div>
                    <div class="card-body">
                        <div class="row" id="hotBooks">
                            <!-- 动态生成热门图书 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 最近借阅 -->
            <div class="col-lg-4 mb-4">
                <div class="content-card">
                    <div class="card-header-custom">
                        <i class="bi bi-clock-history"></i>
                        📖 我的最近借阅
                    </div>
                    <div class="card-body" id="recentBorrows">
                        <!-- 动态生成借阅记录 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p class="mb-2">© 2026 图书借阅管理系统 | 让阅读更美好 📚</p>
            <p class="mb-0">
                <small>Designed with ❤️ for Campus Library</small>
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/permission.js"></script>
    <script src="js/router-guard.js"></script>
    <script>
        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态（未登录会跳转）
            RouterGuard.checkAuth();
            
            // 初始化数据
            Storage.initSampleData();
            
            // 加载页面数据
            loadPageData();
        });
        
        function loadPageData() {
            const currentUser = Storage.getCurrentUser();
            const perm = new PermissionManager();
            
            // 显示用户信息
            document.getElementById('userName').textContent = currentUser.realName || currentUser.username;
            
            // 生成导航菜单
            generateNavigation(perm);
            
            // 加载统计数据
            loadStatistics(currentUser);
            
            // 加载热门图书
            loadHotBooks();
            
            // 加载我的借阅记录
            loadMyBorrows(currentUser.id);
            
            // 生成操作按钮
            generateActionButtons(perm);
        }
        
        function generateNavigation(perm) {
            const menu = document.getElementById('mainMenu');
            let html = `
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">
                        <i class="bi bi-house"></i> 首页
                    </a>
                </li>
            `;

            if (perm.hasRole('librarian')) {
                html += `
                    <li class="nav-item">
                        <a class="nav-link" href="admin/dashboard.html">
                            <i class="bi bi-speedometer2"></i> 控制台
                        </a>
                    </li>
                `;
            }

            html += `
                <li class="nav-item">
                    <a class="nav-link" href="books/list.html">
                        <i class="bi bi-book"></i> 图书列表
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="borrow/my-borrows.html">
                        <i class="bi bi-clock-history"></i> 我的借阅
                    </a>
                </li>
            `;
            
            if (perm.hasRole('librarian')) {
                html += `
                    <li class="nav-item">
                        <a class="nav-link" href="borrow/all-borrows.html">
                            <i class="bi bi-journal-text"></i> 全部借阅
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="categories/manage.html">
                            <i class="bi bi-tags"></i> 分类管理
                        </a>
                    </li>
                `;
            }
            
            if (perm.hasRole('admin')) {
                html += `
                    <li class="nav-item">
                        <a class="nav-link" href="users/manage.html">
                            <i class="bi bi-people"></i> 用户管理
                        </a>
                    </li>
                `;
            }
            
            // 个人信息放在最后
            html += `
                <li class="nav-item">
                    <a class="nav-link" href="users/profile.html">
                        <i class="bi bi-person-circle"></i> 个人信息
                    </a>
                </li>
            `;

            menu.innerHTML = html;
        }
        
        function loadStatistics(currentUser) {
            const books = Storage.getBooks();
            const borrows = Storage.getUserBorrows(currentUser.id);
            
            const totalBooks = books.length;
            const availableBooks = books.filter(b => b.availableCopies > 0).length;
            const borrowedBooks = books.filter(b => b.availableCopies === 0).length;
            const myBorrows = borrows.filter(b => b.status === 'borrowing').length;
            
            // 动画显示数字
            animateNumber('totalBooks', totalBooks);
            animateNumber('availableBooks', availableBooks);
            animateNumber('borrowedBooks', borrowedBooks);
            animateNumber('myBorrows', myBorrows);
        }
        
        function animateNumber(elementId, target) {
            const element = document.getElementById(elementId);
            let current = 0;
            const increment = Math.ceil(target / 30);
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                element.textContent = current;
            }, 30);
        }
        
        function loadHotBooks() {
            const books = Storage.getBooks()
                .sort((a, b) => b.borrowCount - a.borrowCount)
                .slice(0, 4);
            
            const container = document.getElementById('hotBooks');
            
            if (books.length === 0) {
                container.innerHTML = '<div class="col-12 text-center text-muted">暂无图书数据</div>';
                return;
            }
            
            container.innerHTML = books.map(book => `
                <div class="col-md-6 mb-3">
                    <div class="book-card">
                        <div class="book-cover">
                            📖
                            <span class="book-status-badge ${book.availableCopies > 0 ? 'badge-available' : 'badge-borrowed'}">
                                ${book.availableCopies > 0 ? '可借' : '已借完'}
                            </span>
                        </div>
                        <div class="book-info">
                            <h6 class="book-title">${book.title}</h6>
                            <p class="book-author">✍️ ${book.author}</p>
                            <div class="book-meta">
                                <span><i class="bi bi-star-fill"></i> ${book.rating || '暂无'}</span>
                                <span><i class="bi bi-graph-up"></i> ${book.borrowCount}次借阅</span>
                            </div>
                            <a href="books/detail.html?id=${book.id}" class="btn btn-primary btn-small w-100 mt-2">
                                <i class="bi bi-eye"></i> 查看详情
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function loadMyBorrows(userId) {
            const borrows = Storage.getUserBorrows(userId)
                .filter(b => b.status === 'borrowing')
                .slice(0, 3);
            
            const container = document.getElementById('recentBorrows');
            
            if (borrows.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h5>暂无借阅记录</h5>
                        <p>去图书列表借一本书吧！</p>
                        <a href="books/list.html" class="btn btn-primary">
                            <i class="bi bi-book"></i> 去借书
                        </a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = borrows.map(borrow => {
                const daysLeft = Math.ceil((new Date(borrow.dueDate) - new Date()) / (1000 * 60 * 60 * 24));
                const isOverdue = daysLeft < 0;
                
                return `
                    <div class="borrow-item ${isOverdue ? 'overdue' : ''}">
                        <div class="borrow-book-title">${borrow.bookTitle}</div>
                        <div class="borrow-info">
                            <div><i class="bi bi-calendar"></i> 借阅：${formatDate(borrow.borrowDate)}</div>
                            <div><i class="bi bi-clock"></i> 应还：${formatDate(borrow.dueDate)}</div>
                        </div>
                        <div class="borrow-actions">
                            <span class="badge ${isOverdue ? 'bg-danger' : 'bg-success'}">
                                ${isOverdue ? `逾期${Math.abs(daysLeft)}天` : `剩余${daysLeft}天`}
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function generateActionButtons(perm) {
            const container = document.getElementById('actionButtons');
            let html = '';
            
            html += `<a href="books/list.html" class="btn btn-hero btn-hero-primary">
                <i class="bi bi-search"></i> 浏览图书
            </a>`;
            
            if (perm.hasRole('librarian')) {
                html += `<a href="books/add.html" class="btn btn-hero btn-hero-outline">
                    <i class="bi bi-plus-circle"></i> 添加图书
                </a>`;
            }
            
            container.innerHTML = html;
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }
    </script>
</body>
</html>
