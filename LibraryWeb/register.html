<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 图书借阅管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 注册页专属样式 */
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* 动态背景 */
        .register-container::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.1) 2px, transparent 2px),
                radial-gradient(circle, rgba(255,255,255,0.08) 1.5px, transparent 1.5px);
            background-size: 60px 60px, 40px 40px;
            background-position: 0 0, 30px 30px;
            animation: particleFloat 25s linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-60px, -60px); }
        }

        .register-card {
            max-width: 560px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3),
                        0 0 0 1px rgba(255, 255, 255, 0.1);
            padding: 3rem 2.5rem;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-logo {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            animation: bounce 2s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .register-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .register-subtitle {
            color: #7f8c8d;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .form-label i {
            font-size: 1.2rem;
            color: #f5576c;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 0.875rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-control:focus {
            border-color: #f5576c;
            box-shadow: 0 0 0 4px rgba(245, 87, 108, 0.1);
            transform: translateY(-2px);
        }

        .form-control.is-valid {
            border-color: #2ecc71;
        }

        .form-control.is-invalid {
            border-color: #ff6b6b;
        }

        .form-text {
            font-size: 0.85rem;
            color: #95a5a6;
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .form-text i {
            font-size: 0.9rem;
        }

        /* 按钮样式 */
        .btn-register {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
            position: relative;
            overflow: hidden;
            margin-top: 1rem;
        }

        .btn-register::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(245, 87, 108, 0.5);
        }

        .btn-register:hover::before {
            left: 100%;
        }

        .btn-register:active {
            transform: translateY(-1px);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 登录链接 */
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #7f8c8d;
        }

        .login-link a {
            color: #f5576c;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .login-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            transition: width 0.3s ease;
        }

        .login-link a:hover {
            color: #f093fb;
        }

        .login-link a:hover::after {
            width: 100%;
        }

        /* 提示框 */
        .alert {
            border-radius: 12px;
            border: none;
            padding: 1rem;
            font-weight: 500;
            animation: shake 0.5s ease-in-out;
        }

        .alert-danger {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.1) 0%, rgba(255, 142, 142, 0.1) 100%);
            color: #e74c3c;
        }

        .alert-success {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.1) 0%, rgba(88, 214, 141, 0.1) 100%);
            color: #27ae60;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 密码强度指示器 */
        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            border-radius: 2px;
            background: #e0e0e0;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-weak {
            width: 33%;
            background: #ff6b6b;
        }

        .strength-medium {
            width: 66%;
            background: #feca57;
        }

        .strength-strong {
            width: 100%;
            background: #2ecc71;
        }

        /* 响应式优化 */
        @media (max-width: 576px) {
            .register-card {
                padding: 2rem 1.5rem;
            }

            .register-title {
                font-size: 1.6rem;
            }

            .register-logo {
                font-size: 3rem;
            }

            .row {
                margin: 0;
            }

            .col-md-6 {
                padding: 0;
            }
        }

        /* 滚动条美化 */
        .register-card::-webkit-scrollbar {
            width: 6px;
        }

        .register-card::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .register-card::-webkit-scrollbar-thumb {
            background: #f5576c;
            border-radius: 3px;
        }

        .register-card::-webkit-scrollbar-thumb:hover {
            background: #f093fb;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <!-- 头部 -->
            <div class="register-header">
                <div class="register-logo">✨</div>
                <h1 class="register-title">创建账号</h1>
                <p class="register-subtitle">加入图书借阅管理系统</p>
            </div>
            
            <!-- 注册表单 -->
            <form id="registerForm" novalidate>
                <!-- 用户名 -->
                <div class="form-group">
                    <label for="username" class="form-label">
                        <i class="bi bi-person-badge"></i>
                        用户名
                    </label>
                    <input type="text"
                           class="form-control"
                           id="username"
                           name="username"
                           placeholder="4-16位字母或数字"
                           required
                           minlength="4"
                           maxlength="16"
                           autocomplete="username">
                    <div class="form-text">
                        <i class="bi bi-info-circle"></i>
                        用户名用于登录系统
                    </div>
                </div>
                
                <!-- 真实姓名和学号 -->
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="realName" class="form-label">
                                <i class="bi bi-person"></i>
                                真实姓名
                            </label>
                            <input type="text"
                                   class="form-control"
                                   id="realName"
                                   name="realName"
                                   placeholder="请输入真实姓名"
                                   required
                                   autocomplete="name">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="studentId" class="form-label">
                                <i class="bi bi-mortarboard"></i>
                                学号/工号
                            </label>
                            <input type="text"
                                   class="form-control"
                                   id="studentId"
                                   name="studentId"
                                   placeholder="请输入学号或工号"
                                   required
                                   autocomplete="off">
                        </div>
                    </div>
                </div>
                
                <!-- 邮箱 -->
                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="bi bi-envelope"></i>
                        邮箱地址
                    </label>
                    <input type="email"
                           class="form-control"
                           id="email"
                           name="email"
                           placeholder="example@email.com"
                           required
                           autocomplete="email">
                </div>
                
                <!-- 所属部门 -->
                <div class="form-group">
                    <label for="department" class="form-label">
                        <i class="bi bi-building"></i>
                        所属部门/学院
                    </label>
                    <input type="text"
                           class="form-control"
                           id="department"
                           name="department"
                           placeholder="例如：计算机学院"
                           required
                           autocomplete="organization">
                </div>
                
                <!-- 密码 -->
                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock"></i>
                        密码
                    </label>
                    <input type="password"
                           class="form-control"
                           id="password"
                           name="password"
                           placeholder="6-20位，包含字母和数字"
                           required
                           minlength="6"
                           maxlength="20"
                           autocomplete="new-password">
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="form-text">
                        <i class="bi bi-shield-check"></i>
                        密码需包含字母和数字
                    </div>
                </div>
                
                <!-- 确认密码 -->
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">
                        <i class="bi bi-lock-fill"></i>
                        确认密码
                    </label>
                    <input type="password"
                           class="form-control"
                           id="confirmPassword"
                           name="confirmPassword"
                           placeholder="请再次输入密码"
                           required
                           autocomplete="new-password">
                </div>
                
                <!-- 错误提示 -->
                <div id="registerError" class="alert alert-danger d-none" role="alert"></div>
                
                <!-- 成功提示 -->
                <div id="registerSuccess" class="alert alert-success d-none" role="alert"></div>
                
                <!-- 注册按钮 -->
                <button type="submit" class="btn-register">
                    <i class="bi bi-person-plus"></i> 立即注册
                </button>
                
                <!-- 登录链接 -->
                <div class="login-link">
                    <span>已有账号？</span>
                    <a href="login.html">立即登录 →</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="js/validator.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const formValidator = new FormValidator(document.getElementById('registerForm'));
        
        // 实时验证 - 用户名
        document.getElementById('username').addEventListener('blur', function() {
            formValidator.validateField('username', this.value, [
                { type: 'required' },
                { type: 'minLength', params: [4] },
                { type: 'maxLength', params: [16] }
            ]);
        });
        
        // 实时验证 - 邮箱
        document.getElementById('email').addEventListener('blur', function() {
            formValidator.validateField('email', this.value, [
                { type: 'required' },
                { type: 'isEmail' }
            ]);
        });
        
        // 实时验证 - 密码
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('strengthBar');

            // 检查密码强度
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            // 更新强度条
            strengthBar.className = 'password-strength-bar';
            if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
            } else if (strength <= 4) {
                strengthBar.classList.add('strength-medium');
            } else {
                strengthBar.classList.add('strength-strong');
            }
        });

        document.getElementById('password').addEventListener('blur', function() {
            formValidator.validateField('password', this.value, [
                { type: 'required' },
                { type: 'isPassword' }
            ]);
        });
        
        // 实时验证 - 确认密码
        document.getElementById('confirmPassword').addEventListener('blur', function() {
            const password = document.getElementById('password').value;
            formValidator.validateField('confirmPassword', this.value, [
                { type: 'required' },
                { type: 'confirmPassword', params: [password] }
            ]);
        });
        
        // 表单提交
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            
            // 隐藏提示信息
            errorDiv.classList.add('d-none');
            successDiv.classList.add('d-none');
            
            // 获取表单数据
            const formData = {
                username: document.getElementById('username').value.trim(),
                realName: document.getElementById('realName').value.trim(),
                studentId: document.getElementById('studentId').value.trim(),
                email: document.getElementById('email').value.trim(),
                department: document.getElementById('department').value.trim(),
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value
            };
            
            // 整体验证
            const isValid = formValidator.validateForm({
                username: [
                    { type: 'required' },
                    { type: 'minLength', params: [4] },
                    { type: 'maxLength', params: [16] }
                ],
                realName: [{ type: 'required' }],
                studentId: [{ type: 'required' }],
                email: [
                    { type: 'required' },
                    { type: 'isEmail' }
                ],
                department: [{ type: 'required' }],
                password: [
                    { type: 'required' },
                    { type: 'isPassword' }
                ],
                confirmPassword: [
                    { type: 'required' },
                    { type: 'confirmPassword', params: [formData.password] }
                ]
            });
            
            if (!isValid) {
                showError('请检查表单填写是否正确');
                return;
            }
            
            // 执行注册
            try {
                Auth.register({
                    username: formData.username,
                    password: formData.password,
                    email: formData.email,
                    realName: formData.realName,
                    studentId: formData.studentId,
                    department: formData.department,
                    role: 'user',
                    maxBorrowCount: 5
                });
                
                showSuccess('注册成功！即将跳转到登录页...');
                
                // 2秒后跳转
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                showError(error.message);
            }
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('registerError');
            errorDiv.innerHTML = `<i class="bi bi-exclamation-triangle-fill"></i> ${message}`;
            errorDiv.classList.remove('d-none');
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('registerSuccess');
            successDiv.innerHTML = `<i class="bi bi-check-circle-fill"></i> ${message}`;
            successDiv.classList.remove('d-none');
        }
    </script>
</body>
</html>
