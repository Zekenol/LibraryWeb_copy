<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 图书借阅管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        /* 导航栏样式 - 活泼校园风 */
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            box-shadow: 0 4px 16px rgba(74, 144, 226, 0.15) !important;
            padding: 0.6rem 1rem !important;
            min-height: 60px !important;
        }

        .navbar .nav-link {
            color: white !important;
            font-weight: 500 !important;
            padding: 0.6rem 1rem !important;
            line-height: 24px !important;
        }

        .navbar .nav-link:hover,
        .navbar .nav-link.active {
            color: white !important;
            background: rgba(255, 255, 255, 0.15) !important;
        }

        .navbar .navbar-brand {
            color: white !important;
            font-weight: 700 !important;
            font-size: 1.25rem !important;
            line-height: 24px !important;
            padding: 0.6rem 0 !important;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .profile-role {
            font-size: 1rem;
            opacity: 0.9;
        }

        .profile-body {
            padding: 2rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #ecf0f1;
            transition: all 0.3s ease;
        }

        .info-item:hover {
            background: #f8f9fa;
            transform: translateX(5px);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-right: 1rem;
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .btn-edit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-edit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-in;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="../index.html">图书借阅系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html"><i class="bi bi-house"></i> 首页</a>
                    </li>
                    <li class="nav-item" data-permission="librarian">
                        <a class="nav-link" href="../admin/dashboard.html"><i class="bi bi-speedometer2"></i> 控制台</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../books/list.html"><i class="bi bi-book"></i> 图书列表</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../borrow/my-borrows.html"><i class="bi bi-clock-history"></i> 我的借阅</a>
                    </li>
                    <li class="nav-item" data-permission="librarian">
                        <a class="nav-link" href="../borrow/all-borrows.html"><i class="bi bi-journal-text"></i> 全部借阅</a>
                    </li>
                    <li class="nav-item" data-permission="librarian">
                        <a class="nav-link" href="../categories/manage.html"><i class="bi bi-tags"></i> 分类管理</a>
                    </li>
                    <li class="nav-item" data-permission="admin">
                        <a class="nav-link" href="manage.html"><i class="bi bi-people"></i> 用户管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="profile.html"><i class="bi bi-person-circle"></i> 个人信息</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="userName">加载中...</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="javascript:void(0)" onclick="Auth.logout(); return false;">退出</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="profile-card fade-in">
                    <!-- 个人信息头部 -->
                    <div class="profile-header">
                        <div class="profile-avatar">👤</div>
                        <div class="profile-name" id="profileName">加载中...</div>
                        <div class="profile-role" id="profileRole">普通用户</div>
                    </div>

                    <!-- 个人信息主体 -->
                    <div class="profile-body">
                        <div class="info-item">
                            <div class="info-icon">
                                <i class="bi bi-person-badge"></i>
                            </div>
                            <div class="info-content">
                                <div class="info-label">用户名</div>
                                <div class="info-value" id="username">-</div>
                            </div>
                        </div>

                        <div class="info-item">
                            <div class="info-icon">
                                <i class="bi bi-person"></i>
                            </div>
                            <div class="info-content">
                                <div class="info-label">真实姓名</div>
                                <div class="info-value" id="realName">-</div>
                            </div>
                        </div>

                        <div class="info-item">
                            <div class="info-icon">
                                <i class="bi bi-mortarboard"></i>
                            </div>
                            <div class="info-content">
                                <div class="info-label">学号/工号</div>
                                <div class="info-value" id="studentId">-</div>
                            </div>
                        </div>

                        <div class="info-item">
                            <div class="info-icon">
                                <i class="bi bi-envelope"></i>
                            </div>
                            <div class="info-content">
                                <div class="info-label">邮箱地址</div>
                                <div class="info-value" id="email">-</div>
                            </div>
                        </div>

                        <div class="info-item">
                            <div class="info-icon">
                                <i class="bi bi-telephone"></i>
                            </div>
                            <div class="info-content">
                                <div class="info-label">联系电话</div>
                                <div class="info-value" id="phone">-</div>
                            </div>
                        </div>

                        <div class="info-item">
                            <div class="info-icon">
                                <i class="bi bi-building"></i>
                            </div>
                            <div class="info-content">
                                <div class="info-label">所属部门/学院</div>
                                <div class="info-value" id="department">-</div>
                            </div>
                        </div>

                        <div class="info-item">
                            <div class="info-icon">
                                <i class="bi bi-shield-check"></i>
                            </div>
                            <div class="info-content">
                                <div class="info-label">用户角色</div>
                                <div class="info-value" id="role">-</div>
                            </div>
                        </div>

                        <div class="info-item">
                            <div class="info-icon">
                                <i class="bi bi-calendar-check"></i>
                            </div>
                            <div class="info-content">
                                <div class="info-label">注册时间</div>
                                <div class="info-value" id="registerTime">-</div>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <button class="btn btn-edit" onclick="editProfile()">
                                <i class="bi bi-pencil-square"></i> 编辑信息
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑个人信息模态框 -->
    <div class="modal fade" id="profileEditModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑个人信息</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <form id="profileEditForm" class="row g-3">
                        <div class="col-md-6">
                            <label for="editRealName" class="form-label">真实姓名</label>
                            <input type="text" class="form-control" id="editRealName" name="realName" required>
                        </div>
                        <div class="col-md-6">
                            <label for="editStudentId" class="form-label">学号/工号</label>
                            <input type="text" class="form-control" id="editStudentId" name="studentId">
                        </div>
                        <div class="col-md-6">
                            <label for="editEmail" class="form-label">邮箱地址</label>
                            <input type="email" class="form-control" id="editEmail" name="email" required>
                        </div>
                        <div class="col-md-6">
                            <label for="editPhone" class="form-label">联系电话</label>
                            <input type="text" class="form-control" id="editPhone" name="phone" placeholder="请输入手机号">
                        </div>
                        <div class="col-12">
                            <label for="editDepartment" class="form-label">所属部门/学院</label>
                            <input type="text" class="form-control" id="editDepartment" name="department">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-edit" onclick="saveProfile()">保存修改</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/validator.js"></script>
    <script src="../js/permission.js"></script>
    <script src="../js/router-guard.js"></script>
    <script>
        let profileEditModal = null;

        document.addEventListener('DOMContentLoaded', function() {
            RouterGuard.checkAuth();
            Storage.initSampleData();
            
            // 应用权限控制
            const perm = new PermissionManager();
            perm.applyPermissions();

            profileEditModal = new bootstrap.Modal(document.getElementById('profileEditModal'));
            
            loadProfileData();
        });

        function loadProfileData() {
            const currentUser = Storage.getCurrentUser();
            
            // 显示用户信息
            document.getElementById('userName').textContent = currentUser.realName || currentUser.username;
            document.getElementById('profileName').textContent = currentUser.realName || currentUser.username;
            document.getElementById('username').textContent = currentUser.username;
            document.getElementById('realName').textContent = currentUser.realName || '未设置';
            document.getElementById('studentId').textContent = currentUser.studentId || '未设置';
            document.getElementById('email').textContent = currentUser.email || '未设置';
            document.getElementById('phone').textContent = currentUser.phone || '未设置';
            document.getElementById('department').textContent = currentUser.department || '未设置';
            
            // 显示角色
            const roleMap = {
                'admin': '系统管理员',
                'librarian': '图书管理员',
                'user': '普通用户'
            };
            document.getElementById('role').textContent = roleMap[currentUser.role] || '未知';
            document.getElementById('profileRole').textContent = roleMap[currentUser.role] || '未知';
            
            // 显示注册时间（如果有）
            if (currentUser.createdAt) {
                const date = new Date(currentUser.createdAt);
                document.getElementById('registerTime').textContent = date.toLocaleDateString('zh-CN');
            } else {
                document.getElementById('registerTime').textContent = '未知';
            }
        }

        function editProfile() {
            const currentUser = Storage.getCurrentUser();

            if (!currentUser) {
                alert('请先登录');
                return;
            }

            document.getElementById('editRealName').value = currentUser.realName || '';
            document.getElementById('editStudentId').value = currentUser.studentId || '';
            document.getElementById('editEmail').value = currentUser.email || '';
            document.getElementById('editPhone').value = currentUser.phone || '';
            document.getElementById('editDepartment').value = currentUser.department || '';

            profileEditModal.show();
        }

        function saveProfile() {
            const realName = document.getElementById('editRealName').value.trim();
            const email = document.getElementById('editEmail').value.trim();
            const phone = document.getElementById('editPhone').value.trim();

            const requiredCheck = Validator.required(realName, '真实姓名不能为空');
            if (!requiredCheck.valid) {
                alert(requiredCheck.message);
                return;
            }

            const emailCheck = Validator.isEmail(email, '请输入有效的邮箱地址');
            if (!emailCheck.valid) {
                alert(emailCheck.message);
                return;
            }

            if (phone) {
                const phoneCheck = Validator.isPhone(phone, '请输入有效的手机号');
                if (!phoneCheck.valid) {
                    alert(phoneCheck.message);
                    return;
                }
            }

            try {
                Auth.updateProfile({
                    realName,
                    studentId: document.getElementById('editStudentId').value.trim(),
                    email,
                    phone,
                    department: document.getElementById('editDepartment').value.trim()
                });

                loadProfileData();
                profileEditModal.hide();
                alert('个人信息更新成功！');
            } catch (error) {
                alert('保存失败：' + error.message);
            }
        }
    </script>
</body>
</html>
