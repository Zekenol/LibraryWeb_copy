<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验四：使用Bootstrap的HTML5网页布局 - 登录页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 页面整体背景及垂直居中 */
        body {
            background-color: #f1f5f9;
            min-height: 100vh;
        }
        /* 登录卡片自定义样式，还原设计稿质感 */
        .login-card {
            border: none;
            border-radius: 16px;
            overflow: hidden;
            max-width: 450px;
            width: 100%;
        }
        /* 头部流光渐变色 */
        .login-header {
            background: linear-gradient(135deg, #005088 0%, #11caa0 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }
        .login-header h3 {
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        /* 输入框焦点状态微调 */
        .form-control:focus {
            border-color: #11caa0;
            box-shadow: 0 0 0 0.25rem rgba(17, 202, 160, 0.25);
        }
        /* 全宽登录按钮渐变色及动效 */
        .btn-login {
            background: linear-gradient(135deg, #005088 0%, #11caa0 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px;
            transition: opacity 0.3s ease;
        }
        .btn-login:hover {
            opacity: 0.9;
            color: white;
        }
        /* 图标背景规范 */
        .input-group-text {
            background-color: #f8fafc;
            color: #64748b;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3">

    <div class="card login-card shadow-lg">
        <div class="login-header">
            <h3>系统用户登录</h3>
            <p class="mb-0 text-white-50">Welcome back! Please login to your account.</p>
        </div>
        
        <div class="card-body p-4 p-sm-5">
            <form onsubmit="return false;">
                <div class="mb-4">
                    <label class="form-label text-secondary fw-medium">用户名 / 邮箱</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                        <input type="text" class="form-control form-control-lg fs-6" placeholder="请输入您的账号" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary fw-medium">登录密码</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control form-control-lg fs-6" placeholder="请输入密码" required>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label text-muted fs-6" for="rememberMe">记住我</label>
                    </div>
                    <a href="#" class="text-decoration-none fs-6 text-primary">忘记密码？</a>
                </div>

                <button type="submit" class="btn btn-login w-100 btn-lg fs-6 rounded-3 mb-3">安全登录</button>
                
                <div class="text-center">
                    <span class="text-muted fs-6">还没有账号？</span>
                    <a href="#" class="text-decoration-none fs-6 text-success fw-medium">立即注册</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bundle.min.js"></script>
</body>
</html>
